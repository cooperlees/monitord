# Integration test config - varlink enabled (used by .github/workflows/varlink-integration.yml)
[monitord]
dbus_address = unix:path=/run/dbus/system_bus_socket
dbus_timeout = 5
output_format = json-pretty

[networkd]
enabled = true

[pid1]
enabled = true

[units]
enabled = true
state_stats = false

[system-state]
enabled = true

[varlink]
enabled = true
