name: Varlink Integration Test

on: [push, pull_request]

jobs:
  varlink_fedora_rawhide:
    name: Varlink smoke test on Fedora Rawhide
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build monitord-dev container image
        run: docker build -t monitord-dev .

      - name: Start Fedora Rawhide container with systemd
        run: |
          docker run -d --name monitord-test \
            --privileged \
            --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            -v "$GITHUB_WORKSPACE:/workspace" \
            monitord-dev /sbin/init

      - name: Wait for systemd to be ready
        run: |
          for i in $(seq 1 60); do
            status=$(docker exec monitord-test systemctl is-system-running 2>/dev/null || true)
            case "$status" in
              running|degraded) echo "systemd is $status after ${i} polls"; break ;;
            esac
            [ "$i" -eq 60 ] && { echo "Timed out waiting for systemd"; exit 1; }
            printf 'Waiting for systemd (%d/60) status=%s...\n' "$i" "$status"
            sleep 3
          done

      - name: Show systemd version
        run: docker exec monitord-test systemctl --version | head -1

      - name: Build monitord (release)
        run: docker exec -w /workspace monitord-test cargo build --release

      - name: Enable and start systemd-networkd
        run: |
          docker exec monitord-test systemctl enable systemd-networkd
          docker exec monitord-test systemctl start systemd-networkd
          docker exec monitord-test systemctl status systemd-networkd --no-pager

      - name: Confirm varlink sockets are available
        run: |
          docker exec monitord-test test -S /run/systemd/report/io.systemd.Manager \
            && echo "PASS: io.systemd.Manager socket exists" \
            || echo "WARN: io.systemd.Manager socket not found"
          docker exec monitord-test test -S /run/systemd/netif/io.systemd.Network \
            && echo "PASS: io.systemd.Network socket exists" \
            || echo "WARN: io.systemd.Network socket not found (networkd not managing interfaces)"

      - name: Generate varlink-enabled config from monitord.conf
        run: |
          sed \
            -e '/^\[varlink\]/,/^\[/{s/enabled = false/enabled = true/}' \
            monitord.conf > "$GITHUB_WORKSPACE/monitord-varlink-ci.conf"
          echo "--- Generated varlink config ---"
          cat "$GITHUB_WORKSPACE/monitord-varlink-ci.conf"

      - name: Run monitord with varlink enabled and verify output
        run: |
          docker exec monitord-test \
            /workspace/target/release/monitord \
            -c /workspace/monitord-varlink-ci.conf \
            | tee /tmp/monitord-varlink-output.json

          units_total=$(jq '."units.total_units"' /tmp/monitord-varlink-output.json)
          managed_interfaces=$(jq '."networkd.managed_interfaces"' /tmp/monitord-varlink-output.json)
          # Verify total units collected via varlink
          [ "$units_total" -gt 0 ] || { echo "FAIL: units_total=$units_total"; exit 1; }
          # Verify the test dummy interface (monitord0) is managed by networkd
          [ "$managed_interfaces" -ge 1 ] || { echo "FAIL: managed_interfaces=$managed_interfaces"; exit 1; }
          # Verify monitord0 appears and is not fully routable
          # (it has no IP configured so oper_state should be carrier/no-carrier/off, i.e. < 9)
          iface_oper=$(jq '."networkd.monitord0.oper_state"' /tmp/monitord-varlink-output.json)
          [ "$iface_oper" != "null" ] || { echo "FAIL: monitord0 not found in flat output"; exit 1; }
          [ "$iface_oper" -lt 9 ] || { echo "FAIL: monitord0 should not be routable, oper_state=$iface_oper"; exit 1; }
          echo "PASS: units_total=$units_total, managed_interfaces=$managed_interfaces, monitord0 oper_state=$iface_oper"

      - name: Run monitord with D-Bus (no varlink) and save output
        run: |
          docker exec monitord-test \
            /workspace/target/release/monitord \
            -c /workspace/monitord.conf \
            | tee /tmp/monitord-dbus-output.json
          echo "--- D-Bus JSON output ---"
          cat /tmp/monitord-dbus-output.json

      - name: Compare D-Bus and varlink JSON outputs
        run: |
          # json-flat emits one "key": value line per metric in BTreeMap order.
          # Exclude lines whose keys are D-Bus-only or volatile between sequential runs:
          #   services.*        per-service resource counters (absent from varlink)
          #   timers.*          per-timer detail (absent from varlink)
          #   unit_states.*     per-unit state map + time_in_state_usecs (absent from varlink)
          #   pid1.*            procfs counters that change between the two runs
          #   units.loaded/masked/not_found_units  load-state breakdowns absent from varlink
          EXCL='"(services\.|timers\.|unit_states\.|pid1\.|units\.(loaded|masked|not_found)_units)'
          grep -Ev "$EXCL" /tmp/monitord-dbus-output.json    > /tmp/dbus-filtered.txt
          grep -Ev "$EXCL" /tmp/monitord-varlink-output.json > /tmp/varlink-filtered.txt
          if diff -u --label dbus --label varlink /tmp/dbus-filtered.txt /tmp/varlink-filtered.txt; then
            echo "PASS: D-Bus and varlink outputs are identical (excluding known-different fields)"
          else
            echo "FAIL: D-Bus and varlink outputs differ (see diff above)"
            exit 1
          fi
